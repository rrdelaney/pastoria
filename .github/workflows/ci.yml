name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check formatting
        run: vp check

      - name: Build packages
        run: vp run --filter './packages/*' build

      - name: Run tests
        run: vp test

      - name: Link local pastoria CLI
        run: vp install --frozen-lockfile

      - name: Build examples
        run: vp run --filter '@pastoria/example-*' build
